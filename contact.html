<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGOAS.net</title>
    
    <!-- Import the Roboto font -->
     <link href="https://fonts.googleapis.com/css2?family=Anton+SC&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Anton SC', sans-serif;
            background: url('background_contact.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Frosty table styling */
        .frosty-table {
            background: rgba(255, 255, 255, 0.3); /* Semi-transparent white */
            backdrop-filter: blur(10px); /* Frosted glass effect */
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            max-width: 300px;
            margin-left: 10%; /* Move to the left of the page */
            margin-top: 10%; /* Center vertically */
        }

        .frosty-table h1 {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin: 0;
        }

        .frosty-table hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 20px 0;
        }

        .frosty-table p {
            font-size: 16px;
            text-align: center;
        }

        /* Navigation bar styling */
        .navbar {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Slightly transparent black */
            color: white;
            padding: 10px 0;
            position: fixed;
            top: 0;
            text-align: center;
            z-index: 1000;
        }

        .navbar a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 400;
            padding: 10px;
        }

        .navbar a:hover {
            border-bottom: 2px solid white;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <!-- Frosty Table with text -->
    <div class="frosty-table">
        <h1>LEGOAS.net</h1>
        <hr>
        <p>Contacts...</p>
    </div>

</body>
</html>
